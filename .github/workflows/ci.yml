# CI matrix per docs/ARCHITECTURE.md #Build: Linux (GCC, GUI built) and
# Windows (MSVC). Both configure + build + ctest.
name: ci

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - name: Build and test
        run: ./scripts/build.sh build-ci
      - name: Assert GUI was built
        run: test -x build-ci/lexe-installer

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-ci -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-ci --config Release
      - name: Test
        run: ctest --test-dir build-ci -C Release --output-on-failure
